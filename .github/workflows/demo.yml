name: CI Pipeline

on:
  push:

jobs:
  checkout:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

  build:
    needs: checkout
    runs-on: ubuntu-22.04
    steps:
      - run: echo "Building..."

  test:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - run: echo "Testing..."

  deploy:
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - run: echo "Deploying..."
